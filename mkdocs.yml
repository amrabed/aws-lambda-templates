site_name: AWS Lambda Templates - Python
repo_url: https://github.com/amrabed/aws-lambda-templates
repo_name: amrabed/aws-lambda-templates
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 

theme:
  name: material
  features:
  - announce.dismiss
  - content.action.edit
  - content.action.view
  - content.code.annotate
  - content.code.copy
  - content.tooltips
  - navigation.footer
  - navigation.indexes
  - navigation.sections
  - navigation.tabs
  - navigation.tabs.sticky
  - navigation.top
  - search.highlight
  - search.suggest
  - toc.follow

nav:
  - Overview:
    - Overview: README.md
    - License: LICENSE.md
  - Templates:
    - Templates: template/index.md
    - Rest API: template/api.md
    - DynamoDB Stream: template/stream.md
  - Reference:
    - API: reference/api.md
    - Stream: reference/stream.md
    - Repository: reference/repository.md
  - Contributing: CONTRIBUTING.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google  # Or numpy, reST, etc., based on your code style
