site_name: AWS Lambda Template - Python
repo_url: https://github.com/amrabed/aws-lambda-template
repo_name: amrabed/aws-lambda-template
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 

theme:
  name: material
  features:
  - announce.dismiss
  - content.action.edit
  - content.action.view
  - content.code.annotate
  - content.code.copy
  - content.tooltips
  - navigation.footer
  - navigation.indexes
  - navigation.sections
  - navigation.tabs
  - navigation.tabs.sticky
  - navigation.top
  - search.highlight
  - search.suggest
  - toc.follow

nav:
  - Overview:
    - Overview: README.md
    - Contributing: CONTRIBUTING.md
  - Reference:
    - App: reference/app.md
    - Repository: reference/repository.md
    - API: reference/api.md
    - Stream: reference/stream.md

plugins:
  - search
  - macros
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google  # Or numpy, reST, etc., based on your code style
