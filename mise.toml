[tools]
python = "3.14"
uv = "latest"

[settings]
python.uv_venv_auto = "create|source"

[tasks.new]
description = "Create new Lambda function template"
usage = """
arg "<template>" help="Template name"
"""
run = "uv run new -n $usage_template"

[tasks.project]
description = "Rename project (run once)"
usage = """
arg "<name>" help="Project new name" default="templates"
arg "<description>" help="Project short description" default="AWS Lambda Templates"
arg "<author>" help="Author name" default="Amr Abed"
arg "<email>" help="Author email" default=""
arg "<github>" help="GitHub username" default="amrabed"
"""
run = """
uv run rename \
    --name "$usage_name" \
    --description "$usage_description" \
    --author "$usage_author" \
    --email "$usage_email" \
    --github "$usage_github"
"""

[tasks.install]
description = "Install dependencies and project"
run = "uv sync"

[tasks.update]
description = "Update dependencies"
run = "uv lock --upgrade"

[tasks.precommit]
description = "Install pre-commit hooks"
run = "uv run pre-commit autoupdate && uv run pre-commit install"

[tasks.dev]
description = "Set up dev environment"
depends = ["precommit", "install"]

[tasks.lint]
description = "Format and lint code"
run = """
uv run ruff format
uv run ruff check --fix
uv run ruff format
# uv run pyright
"""

[tasks.coverage]
description = "Run tests with coverage"
run = """
uv run coverage run -m pytest .
uv run coverage report -m
uv run coverage xml
"""

[tasks.test]
description = "Run all tests"
depends = ["coverage"]

[tasks.install-docs]
description = "Install documentation dependencies"
run = "uv sync --group docs"

[tasks.docs]
description = "Build and deploy documentation to GitHub pages"
run = "uv run mkdocs gh-deploy --force"

[tasks.local]
description = "Serve documentation on a local server"
run = "uv run mkdocs serve"

[tasks.cdk]
hide = true
usage = """
arg "<action>" help="CDK action to perform"
arg "<stack>" help="CDK stack to target <agent|api|eventbridge|graphql|s3|sqs|stream>"
option "-p --profile <profile>" help="AWS profile to use"
"""
run = """
#!/usr/bin/env bash
case "$usage_stack" in
    agent) CDK_STACK=BedrockAgentStack ;;
    api) CDK_STACK=ApiGatewayDynamodbStack ;;
    stream) CDK_STACK=DynamodbStreamStack ;;
    eventbridge) CDK_STACK=EventBridgeApiCallerStack ;;
    graphql) CDK_STACK=AppSyncDynamodbStack ;;
    s3) CDK_STACK=S3SqsStack ;;
    sqs) CDK_STACK=SqsStack ;;
    *) echo "Error: unknown stack '$usage_stack'"; exit 1 ;;
esac

EXTRA_ARGS=""
if [ "$usage_action" == "deploy" ]; then
    EXTRA_ARGS="--require-approval never"
elif [ "$usage_action" == "destroy" ]; then
    EXTRA_ARGS="--force"
fi

PROFILE="${usage_profile:-$AWS_PROFILE}"
if [ -n "$PROFILE" ]; then
    EXTRA_ARGS="$EXTRA_ARGS --profile $PROFILE"
fi

STACK=$usage_stack uv run cdk $usage_action --app "python infra/app.py" $EXTRA_ARGS $CDK_STACK
"""

[tasks.deploy]
description = "Deploy a CDK stack"
usage = """
arg "<stack>" help="CDK stack to deploy <agent|api|eventbridge|graphql|s3|sqs|stream>"
option "-p --profile <profile>" help="AWS profile to use"
"""
run = "mise run cdk -- deploy $usage_stack ${usage_profile:+--profile $usage_profile}"

[tasks.destroy]
description = "Destroy a deployed CDK stack"
usage = """
arg "<stack>" help="CDK stack to destroy <agent|api|eventbridge|graphql|s3|sqs|stream>"
option "-p --profile <profile>" help="AWS profile to use"
"""
run = "mise run cdk -- destroy $usage_stack ${usage_profile:+--profile $usage_profile}"

[shell_alias]
# Project-specific shortcuts
i = "mise run install"
l = "mise run lint"
t = "mise run test"
d = "mise run deploy"
D = "mise run destroy"

# Common utility aliases
ll = "ls -la"
la = "ls -A"
gs = "git status"
gc = "git commit"
gp = "git push"
