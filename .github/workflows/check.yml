name: Format, Lint, and Test

on:
  workflow_call:
  push:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install mise
        uses: jdx/mise-action@v4
      - name: Install dependencies
        run: mise run install
      - name: Format and lint
        run: mise run lint
      - name: Run tests
        run: mise run test
        env:
          AWS_DEFAULT_REGION: us-east-1
